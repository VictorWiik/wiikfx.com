<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WiikFX — Acessar portal</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%231B4D3E'/%3E%3Ctext y='.9em' font-size='65' font-family='Arial' font-weight='900' x='8'%3E%3Ctspan fill='%234a9e72'%3EW%3C/tspan%3E%3Ctspan fill='%235CBF8A'%3EFX%3C/tspan%3E%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--verde-claro:#5CBF8A;--verde-escuro:#1B4D3E;--preto:#050505;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Outfit',sans-serif;background:var(--preto);color:#fff;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;}
.bg{position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse at 30% 40%,rgba(27,77,62,.45) 0%,transparent 50%),radial-gradient(ellipse at 70% 60%,rgba(92,191,138,.15) 0%,transparent 50%);}
.grid{position:fixed;inset:0;z-index:0;background-image:linear-gradient(rgba(92,191,138,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(92,191,138,.03) 1px,transparent 1px);background-size:60px 60px;}
.card{position:relative;z-index:10;background:rgba(13,13,13,.9);border:1px solid rgba(92,191,138,.2);border-radius:24px;padding:2.5rem 2rem;width:100%;max-width:420px;animation:fadeUp .6s ease both;}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
.logo{font-size:1.6rem;font-weight:900;letter-spacing:-1px;text-align:center;margin-bottom:2rem;display:block;text-decoration:none;}
.logo .wiik{color:var(--verde-escuro);}.logo .fx{color:var(--verde-claro);}
h1{font-size:1.3rem;font-weight:800;margin-bottom:.4rem;}
.sub{color:#888;font-size:.9rem;margin-bottom:2rem;line-height:1.6;}
.form-label{display:block;font-size:.82rem;font-weight:600;color:#ccc;margin-bottom:.5rem;}
.form-input{width:100%;padding:.85rem 1rem;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:12px;color:#fff;font-size:.95rem;font-family:'Outfit',sans-serif;transition:all .25s ease;margin-bottom:1.2rem;}
.form-input:focus{outline:none;border-color:rgba(92,191,138,.5);background:rgba(92,191,138,.04);}
.form-input::placeholder{color:#444;}
.btn{width:100%;padding:1rem;background:var(--verde-claro);color:var(--preto);border:none;border-radius:12px;font-size:1rem;font-weight:800;font-family:'Outfit',sans-serif;cursor:pointer;transition:all .3s ease;display:flex;align-items:center;justify-content:center;gap:.5rem;}
.btn:hover{background:#4CAF7A;transform:translateY(-2px);box-shadow:0 12px 30px rgba(92,191,138,.3);}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none;}
.success-box{display:none;background:rgba(27,77,62,.2);border:1px solid rgba(92,191,138,.3);border-radius:12px;padding:1.2rem;text-align:center;margin-top:1.2rem;}
.success-box .icon{font-size:2rem;margin-bottom:.5rem;}
.success-box p{font-size:.9rem;color:#aaa;line-height:1.6;}
.success-box strong{color:var(--verde-claro);}
.error-box{display:none;background:rgba(231,76,60,.1);border:1px solid rgba(231,76,60,.3);border-radius:12px;padding:1rem;font-size:.85rem;color:#e74c3c;margin-bottom:1rem;}
.back-link{display:block;text-align:center;margin-top:1.5rem;color:#555;font-size:.85rem;text-decoration:none;}
.back-link:hover{color:var(--verde-claro);}
.divider{height:1px;background:rgba(255,255,255,.06);margin:1.5rem 0;}
</style>
</head>
<body>
<div class="bg"></div>
<div class="grid"></div>
<div class="card">
  <a href="/" class="logo"><span class="wiik">Wiik</span><span class="fx">FX</span></a>
  <h1>Acessar meu portal</h1>
  <p class="sub">Digite o e-mail usado na contratação. Enviaremos um link de acesso.</p>

  <div class="error-box" id="error-box"></div>

  <div id="form-area">
    <label class="form-label" for="email">E-mail</label>
    <input class="form-input" id="email" type="email" placeholder="seu@email.com" onkeydown="if(event.key==='Enter') enviar()">
    <button class="btn" id="btn-enviar" onclick="enviar()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4l16 8-16 8V4z"/></svg>
      Enviar link de acesso
    </button>
  </div>

  <div class="success-box" id="success-box">
    <div class="icon">📬</div>
    <p>Link enviado para <strong id="email-enviado"></strong><br>Verifique sua caixa de entrada e clique no link. Ele expira em <strong>15 minutos</strong>.</p>
  </div>

  <div class="divider"></div>
  <a href="/vps" class="back-link">← Contratar uma VPS</a>
</div>

<script>
const params = new URLSearchParams(window.location.search);
if (params.get('erro') === 'link_invalido') {
  const err = document.getElementById('error-box');
  err.textContent = 'Link inválido ou expirado. Solicite um novo.';
  err.style.display = 'block';
}

async function enviar() {
  const email = document.getElementById('email').value.trim();
  if (!email) return;
  const btn = document.getElementById('btn-enviar');
  const errBox = document.getElementById('error-box');
  errBox.style.display = 'none';
  btn.disabled = true;
  btn.innerHTML = 'Enviando...';

  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Erro ao enviar');
    document.getElementById('form-area').style.display = 'none';
    document.getElementById('email-enviado').textContent = email;
    document.getElementById('success-box').style.display = 'block';
  } catch (err) {
    errBox.textContent = err.message;
    errBox.style.display = 'block';
    btn.disabled = false;
    btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4l16 8-16 8V4z"/></svg> Enviar link de acesso';
  }
}
</script>
</body>
</html>
