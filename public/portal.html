<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WiikFX — Meu Portal</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%231B4D3E'/%3E%3Ctext y='.9em' font-size='65' font-family='Arial' font-weight='900' x='8'%3E%3Ctspan fill='%234a9e72'%3EW%3C/tspan%3E%3Ctspan fill='%235CBF8A'%3EFX%3C/tspan%3E%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--verde-claro:#5CBF8A;--verde-escuro:#1B4D3E;--preto:#050505;--card:#0d0d0d;--border:rgba(92,191,138,.15);}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Outfit',sans-serif;background:#080808;color:#fff;min-height:100vh;}
.bg{position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse at 10% 20%,rgba(27,77,62,.3) 0%,transparent 50%);}
.grid{position:fixed;inset:0;z-index:0;background-image:linear-gradient(rgba(92,191,138,.02) 1px,transparent 1px),linear-gradient(90deg,rgba(92,191,138,.02) 1px,transparent 1px);background-size:60px 60px;}

/* Nav */
nav{position:sticky;top:0;z-index:100;background:rgba(5,5,5,.85);backdrop-filter:blur(16px);border-bottom:1px solid rgba(92,191,138,.08);padding:0 24px;}
.nav-inner{max-width:1000px;margin:0 auto;height:64px;display:flex;align-items:center;justify-content:space-between;}
.logo{font-size:1.3rem;font-weight:900;text-decoration:none;letter-spacing:-1px;}
.logo .wiik{color:var(--verde-escuro);}.logo .fx{color:var(--verde-claro);}
.nav-right{display:flex;align-items:center;gap:1rem;}
.nav-nome{font-size:.85rem;color:#888;}
.btn-logout{background:transparent;border:1px solid rgba(255,255,255,.1);color:#888;padding:.4rem .9rem;border-radius:8px;font-size:.8rem;font-family:'Outfit',sans-serif;cursor:pointer;transition:all .2s ease;}
.btn-logout:hover{border-color:rgba(231,76,60,.4);color:#e74c3c;}

/* Layout */
.wrapper{position:relative;z-index:10;max-width:1000px;margin:0 auto;padding:2rem 24px;}

/* Loading */
.loading{display:flex;align-items:center;justify-content:center;min-height:50vh;flex-direction:column;gap:1rem;}
.spinner{width:36px;height:36px;border:3px solid rgba(92,191,138,.2);border-top-color:var(--verde-claro);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* Saudação */
.greeting{margin-bottom:2rem;}
.greeting h1{font-size:1.6rem;font-weight:800;margin-bottom:.3rem;}
.greeting p{color:#888;font-size:.9rem;}

/* Grid */
.vms-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px;margin-bottom:2.5rem;}

/* VM Card */
.vm-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:1.5rem;transition:border-color .25s ease;}
.vm-card:hover{border-color:rgba(92,191,138,.3);}
.vm-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.2rem;}
.vm-plano{font-size:.75rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--verde-claro);}
.vm-status{display:flex;align-items:center;gap:.4rem;font-size:.78rem;font-weight:600;}
.status-dot{width:7px;height:7px;border-radius:50%;}
.status-dot.ativa{background:#5CBF8A;box-shadow:0 0 6px rgba(92,191,138,.6);}
.status-dot.inativa{background:#e74c3c;}
.status-dot.pendente{background:#F5A623;}

.vm-info{display:flex;flex-direction:column;gap:.7rem;margin-bottom:1.5rem;}
.vm-row{display:flex;align-items:center;justify-content:space-between;}
.vm-row-label{font-size:.8rem;color:#666;}
.vm-row-value{font-size:.88rem;font-weight:600;color:#ccc;display:flex;align-items:center;gap:.5rem;}
.copy-btn{background:none;border:none;cursor:pointer;color:#555;padding:2px;transition:color .2s ease;display:flex;align-items:center;}
.copy-btn:hover{color:var(--verde-claro);}
.copy-btn svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}

.vm-expira{background:rgba(27,77,62,.15);border:1px solid rgba(92,191,138,.1);border-radius:10px;padding:.6rem .9rem;font-size:.78rem;color:#888;margin-bottom:1.2rem;}
.vm-expira span{color:var(--verde-claro);font-weight:600;}

.vm-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.btn-action{padding:.65rem;border-radius:10px;font-size:.8rem;font-weight:600;font-family:'Outfit',sans-serif;cursor:pointer;transition:all .2s ease;border:none;display:flex;align-items:center;justify-content:center;gap:.4rem;}
.btn-action svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.btn-restart{background:rgba(92,191,138,.1);color:var(--verde-claro);border:1px solid rgba(92,191,138,.25);}
.btn-restart:hover{background:rgba(92,191,138,.2);}
.btn-rdp{background:rgba(255,255,255,.05);color:#ccc;border:1px solid rgba(255,255,255,.1);}
.btn-rdp:hover{background:rgba(255,255,255,.1);}

/* Pagamentos */
.section-title{font-size:1rem;font-weight:700;color:#ccc;margin-bottom:1rem;display:flex;align-items:center;gap:.5rem;}
.section-title::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.06);}
.pag-table{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden;}
.pag-header{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;background:rgba(27,77,62,.15);padding:.75rem 1.2rem;font-size:.75rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#555;}
.pag-row{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;padding:.85rem 1.2rem;border-top:1px solid rgba(255,255,255,.04);font-size:.85rem;align-items:center;}
.pag-row:hover{background:rgba(255,255,255,.02);}
.badge{display:inline-block;padding:.2rem .6rem;border-radius:100px;font-size:.7rem;font-weight:700;}
.badge-ok{background:rgba(92,191,138,.15);color:var(--verde-claro);}
.badge-pend{background:rgba(245,166,35,.15);color:#F5A623;}
.badge-fail{background:rgba(231,76,60,.15);color:#e74c3c;}

/* Empty state */
.empty{text-align:center;padding:3rem;color:#555;}
.empty-icon{font-size:2.5rem;margin-bottom:.8rem;}
.empty p{font-size:.9rem;line-height:1.6;}
.empty a{color:var(--verde-claro);text-decoration:none;}

/* Toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#0d0d0d;border:1px solid rgba(92,191,138,.3);color:var(--verde-claro);padding:.7rem 1.4rem;border-radius:100px;font-size:.85rem;font-weight:600;transition:transform .3s ease;z-index:999;}
.toast.show{transform:translateX(-50%) translateY(0);}

@media(max-width:600px){
  .pag-header,.pag-row{grid-template-columns:1fr 1fr 1fr;}
  .pag-header div:nth-child(3),.pag-row div:nth-child(3){display:none;}
  .vm-actions{grid-template-columns:1fr;}
}
</style>
</head>
<body>
<div class="bg"></div>
<div class="grid"></div>

<nav>
  <div class="nav-inner">
    <a href="/" class="logo"><span class="wiik">Wiik</span><span class="fx">FX</span></a>
    <div class="nav-right">
      <span class="nav-nome" id="nav-nome"></span>
      <button class="btn-logout" onclick="logout()">Sair</button>
    </div>
  </div>
</nav>

<div class="wrapper">
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <span style="color:#555;font-size:.9rem;">Carregando seu painel...</span>
  </div>

  <div id="content" style="display:none">
    <div class="greeting">
      <h1>Olá, <span id="greeting-nome"></span> 👋</h1>
      <p>Gerencie suas VPS e histórico de pagamentos.</p>
    </div>

    <!-- VMs -->
    <div class="section-title">Suas VPS</div>
    <div class="vms-grid" id="vms-grid"></div>

    <!-- Pagamentos -->
    <div class="section-title">Histórico de pagamentos</div>
    <div id="pag-container"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let dadosPortal = null;

async function carregar() {
  try {
    const res = await fetch('/api/portal/dados');
    if (res.status === 401) return window.location.href = '/login';
    dadosPortal = await res.json();
    renderizar(dadosPortal);
  } catch(e) {
    window.location.href = '/login';
  }
}

function renderizar({ cliente, vms, pagamentos }) {
  document.getElementById('nav-nome').textContent = cliente.nome;
  document.getElementById('greeting-nome').textContent = cliente.nome.split(' ')[0];
  document.getElementById('loading').style.display = 'none';
  document.getElementById('content').style.display = 'block';

  // VMs
  const grid = document.getElementById('vms-grid');
  if (!vms.length) {
    grid.innerHTML = `<div class="empty" style="grid-column:1/-1"><div class="empty-icon">🖥️</div><p>Você ainda não tem VPS ativa.<br><a href="/vps">Contratar agora →</a></p></div>`;
  } else {
    grid.innerHTML = vms.map(vm => {
      const expira = vm.expira_em ? new Date(vm.expira_em) : null;
      const expiraStr = expira ? expira.toLocaleDateString('pt-BR') : '—';
      const diasRestantes = expira ? Math.ceil((expira - Date.now()) / 86400000) : null;
      const alertaExpira = diasRestantes !== null && diasRestantes <= 7;
      const statusCor = vm.status === 'ativa' ? 'ativa' : vm.status === 'pendente' ? 'pendente' : 'inativa';
      const planoLabel = vm.plano === 'basic' ? 'VPS Basic' : 'VPS Pro';
      const periodoLabel = { mensal:'Mensal', trimestral:'Trimestral', anual:'Anual' }[vm.tipo_cobranca] || vm.tipo_cobranca;

      return `
        <div class="vm-card">
          <div class="vm-header">
            <span class="vm-plano">${planoLabel}</span>
            <span class="vm-status">
              <span class="status-dot ${statusCor}"></span>
              ${vm.status === 'ativa' ? 'Ativa' : vm.status === 'pendente' ? 'Pendente' : 'Inativa'}
            </span>
          </div>
          <div class="vm-info">
            <div class="vm-row">
              <span class="vm-row-label">IP</span>
              <span class="vm-row-value">
                ${vm.ip || '—'}
                ${vm.ip ? `<button class="copy-btn" onclick="copiar('${vm.ip}','IP copiado!')"><svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg></button>` : ''}
              </span>
            </div>
            <div class="vm-row">
              <span class="vm-row-label">Usuário</span>
              <span class="vm-row-value">${vm.usuario || 'Administrator'}</span>
            </div>
            <div class="vm-row">
              <span class="vm-row-label">Senha</span>
              <span class="vm-row-value">
                <span id="senha-${vm.id}" style="letter-spacing:2px">••••••••</span>
                <button class="copy-btn" onclick="toggleSenha(${vm.id},'${vm.senha}')">
                  <svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                </button>
                <button class="copy-btn" onclick="copiar('${vm.senha}','Senha copiada!')"><svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg></button>
              </span>
            </div>
            <div class="vm-row">
              <span class="vm-row-label">Porta RDP</span>
              <span class="vm-row-value">${vm.porta || 3389}</span>
            </div>
            <div class="vm-row">
              <span class="vm-row-label">Período</span>
              <span class="vm-row-value">${periodoLabel}</span>
            </div>
          </div>
          <div class="vm-expira" style="${alertaExpira ? 'border-color:rgba(245,166,35,.3);' : ''}">
            ${alertaExpira ? '⚠️ ' : ''}Expira em <span>${expiraStr}</span>
            ${diasRestantes !== null ? `· ${diasRestantes} dias` : ''}
          </div>
          <div class="vm-actions">
            <button class="btn-action btn-restart" onclick="reiniciar(${vm.vmid}, this)">
              <svg viewBox="0 0 24 24"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4"/></svg>
              Reiniciar
            </button>
            <button class="btn-action btn-rdp" onclick="copiarRDP('${vm.ip}',${vm.porta || 3389})">
              <svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
              Copiar RDP
            </button>
          </div>
        </div>`;
    }).join('');
  }

  // Pagamentos
  const pagContainer = document.getElementById('pag-container');
  if (!pagamentos.length) {
    pagContainer.innerHTML = `<div class="empty"><div class="empty-icon">📋</div><p>Nenhum pagamento encontrado.</p></div>`;
  } else {
    const PERIODO = { mensal:'Mensal', trimestral:'Trimestral', anual:'Anual' };
    const rows = pagamentos.map(p => {
      const data = new Date(p.criado_em).toLocaleDateString('pt-BR');
      const valor = p.valor ? `R$ ${parseFloat(p.valor).toFixed(2).replace('.',',')}` : '—';
      const badge = p.status === 'aprovado' ? 'badge-ok' : p.status === 'pendente' ? 'badge-pend' : 'badge-fail';
      const statusLabel = p.status === 'aprovado' ? 'Aprovado' : p.status === 'pendente' ? 'Pendente' : 'Falhou';
      const plano = p.plano === 'basic' ? 'Basic' : p.plano === 'pro' ? 'Pro' : '—';
      const periodo = PERIODO[p.tipo] || p.tipo || '—';
      return `<div class="pag-row"><div>${data}</div><div>${plano} · ${periodo}</div><div>${valor}</div><div><span class="badge ${badge}">${statusLabel}</span></div></div>`;
    }).join('');
    pagContainer.innerHTML = `<div class="pag-table"><div class="pag-header"><div>Data</div><div>Plano</div><div>Valor</div><div>Status</div></div>${rows}</div>`;
  }
}

function toggleSenha(vmId, senha) {
  const el = document.getElementById(`senha-${vmId}`);
  if (el.textContent.includes('•')) {
    el.textContent = senha;
    el.style.letterSpacing = 'normal';
  } else {
    el.textContent = '••••••••';
    el.style.letterSpacing = '2px';
  }
}

function copiar(texto, msg) {
  navigator.clipboard.writeText(texto).then(() => toast(msg));
}

function copiarRDP(ip, porta) {
  const rdp = `${ip}:${porta}`;
  navigator.clipboard.writeText(rdp).then(() => toast('Endereço RDP copiado!'));
}

async function reiniciar(vmid, btn) {
  if (!vmid) return toast('VM sem ID configurado ainda');
  if (!confirm('Reiniciar a VPS agora?')) return;
  btn.disabled = true;
  btn.innerHTML = '⏳ Reiniciando...';
  try {
    const res = await fetch(`/api/portal/reiniciar/${vmid}`, { method: 'POST' });
    const data = await res.json();
    toast(data.ok ? 'VM reiniciando... aguarde ~1 min' : 'Erro ao reiniciar');
  } catch { toast('Erro ao reiniciar'); }
  setTimeout(() => {
    btn.disabled = false;
    btn.innerHTML = '<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4"/></svg> Reiniciar';
  }, 3000);
}

async function logout() {
  await fetch('/api/auth/logout', { method: 'POST' });
  window.location.href = '/login';
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}

carregar();
</script>
</body>
</html>
